name: ${USER}_a2_ros

x-common: &common
  init: true
  network_mode: host
  # Share the host IPC namespace so containers use the host's large /dev/shm
  # instead of the 64 MB default. Required for Zenoh shared-memory transport
  # (many sim nodes pushing point clouds/images would otherwise hit OS error 12).
  ipc: host
  privileged: true
  # Allow the Zenoh SHM watchdog threads to set real-time scheduling priority
  # (otherwise they warn "error setting scheduling priority OS(1)") and lock
  # the SHM pools into memory.
  ulimits:
    rtprio: 99
    nice: -20
    memlock: -1
  # gpus: all
  environment:
    # Linux: inherits the host's DISPLAY (e.g. :0) for native X11 forwarding
    # through the bind-mounted /tmp/.X11-unix. macOS/Windows: the host has no X
    # server, so default to :20 — the KasmVNC display in the `vnc` service
    # (a high number that won't collide with host :0/:1 or other VNC instances).
    # (Also silences the "DISPLAY variable is not set" warning on macOS/Windows.)
    - DISPLAY=${DISPLAY:-:20}
    - QT_X11_NO_MITSHM=1
  working_dir: /a2_ros
  command: [ "bash" ]
  stdin_open: true
  tty: true

# Individual bind-mount anchors so services can compose their own volume lists
x-vol-x11: &vol-x11
  type: bind
  source: /tmp/.X11-unix
  target: /tmp/.X11-unix
x-vol-xauth: &vol-xauth
  # Mount the real X auth cookie. Display managers (e.g. GDM) keep it at
  # $XAUTHORITY (e.g. /run/user/UID/gdm/Xauthority), not ~/.Xauthority — so
  # prefer $XAUTHORITY and fall back to ~/.Xauthority when it is unset.
  type: bind
  source: ${XAUTHORITY:-${HOME}/.Xauthority}
  target: /home/ubuntu/.Xauthority
x-vol-workspace: &vol-workspace
  type: bind
  source: .
  target: /a2_ros
x-vol-bags: &vol-bags
  # ROS bags — bind mount so bags are accessible from the host.
  # Override ROS_BAGS_DIR in a .env file to point at your archive directory.
  type: bind
  source: ${ROS_BAGS_DIR:-./bags}
  target: /a2_ros/bags

services:
  # Build-only service for the builder stage (Unitree SDK, MuJoCo, Python venv).
  # Not a runnable container — only used to tag and cache this expensive stage.
  # Build with: docker compose --profile build build a2_ros_builder
  a2_ros_builder:
    <<: *common
    image: a2_ros:builder
    profiles: [build]
    build:
      context: .
      dockerfile: ./environment/Dockerfile.dev
      target: builder
      cache_from:
        - a2_ros:builder
      cache_to:
        - type=inline

  a2_base:
    <<: *common
    image: a2_ros:base
    build:
      context: .
      dockerfile: ./environment/Dockerfile.dev
      target: a2_base
      cache_from:
        - a2_ros:base
        - a2_ros:builder
      cache_to:
        - type=inline
    volumes:
      - *vol-x11
      - *vol-xauth
      - *vol-workspace
      - *vol-bags

  a2_ros_dev:
    <<: *common
    image: a2_ros:dev
    build:
      context: .
      dockerfile: ./environment/Dockerfile.dev
      target: dev
      args:
        UID: ${HOST_UID:-1000}
        GID: ${HOST_GID:-1000}
        INPUT_GID: ${INPUT_GID:-107}
      cache_from:
        - a2_ros:dev
        - a2_ros:base
        - a2_ros:builder
      cache_to:
        - type=inline
    depends_on:
      - zenoh_router_sim
    devices:
      - /dev/input/js0:/dev/input/js0
    volumes:
      - *vol-x11
      - *vol-xauth
      - *vol-workspace
      - *vol-bags
      - type: volume
        source: dev_bash_history
        target: /home/ubuntu/.bash_history_dir
      - type: volume
        source: dev_colcon_build
        target: /a2_ros/build
      - type: volume
        source: dev_colcon_install
        target: /a2_ros/install
      - type: volume
        source: dev_rosdep_cache
        target: /home/ubuntu/.ros

  # NUC (192.168.124.124). Does NOT start a Zenoh router — its nodes connect to
  # the router running on pc2 (ZENOH_ROUTER_IP_ROBOT in .env). Start the router
  # via the a2_ros_pc2 service on pc2 instead.
  a2_ros_nuc:
    <<: *common
    # Shared image: a2_ros_nuc and a2_ros_pc2 have identical builds, so they tag
    # the same image and Compose builds it only once.
    image: a2_ros:robot
    build:
      context: .
      dockerfile: ./environment/Dockerfile.dev
      target: robot
      args:
        UID: ${HOST_UID:-1000}
        GID: ${HOST_GID:-1000}
        INPUT_GID: ${INPUT_GID:-107}
      cache_from:
        - a2_ros:robot
        - a2_ros:base
        - a2_ros:builder
      cache_to:
        - type=inline
    shm_size: '512m'
    volumes:
      - *vol-x11
      - *vol-xauth
      - *vol-workspace
      - *vol-bags
      - type: volume
        source: robot_bash_history
        target: /home/ubuntu/.bash_history_dir
      - type: volume
        source: robot_colcon_build
        target: /a2_ros/build
      - type: volume
        source: robot_colcon_install
        target: /a2_ros/install
      - type: volume
        source: robot_rosdep_cache
        target: /home/ubuntu/.ros

  # pc2 (192.168.124.162). Starts the Zenoh router (via depends_on) plus its ROS
  # nodes. This is the single router host for the robot network — every robot
  # node (including a2_ros_nuc on .124) discovers through it. pc2 runs the core
  # native stack (camera, low-level control) and is started first, so it hosts
  # the discovery rendezvous. Matches ZENOH_ROUTER_IP_ROBOT in .env. Bring it up
  # with:  docker compose up -d a2_ros_pc2
  a2_ros_pc2:
    <<: *common
    # Shared image with a2_ros_nuc (identical build) — see note there.
    image: a2_ros:robot
    build:
      context: .
      dockerfile: ./environment/Dockerfile.dev
      target: robot
      args:
        UID: ${HOST_UID:-1000}
        GID: ${HOST_GID:-1000}
        INPUT_GID: ${INPUT_GID:-107}
      cache_from:
        - a2_ros:robot
        - a2_ros:base
        - a2_ros:builder
      cache_to:
        - type=inline
    depends_on:
      - zenoh_router_robot
    shm_size: '512m'
    # Intentionally left out until we start testing on the robot
    # devices:
    #   - /dev/input/js0:/dev/input/js0
    volumes:
      - *vol-x11
      - *vol-xauth
      - *vol-workspace
      - *vol-bags
      - type: volume
        source: robot_bash_history
        target: /home/ubuntu/.bash_history_dir
      - type: volume
        source: robot_colcon_build
        target: /a2_ros/build
      - type: volume
        source: robot_colcon_install
        target: /a2_ros/install
      - type: volume
        source: robot_rosdep_cache
        target: /home/ubuntu/.ros

  # ---- Zenoh discovery routers --------------------------------------------
  # The Zenoh router (rmw_zenohd) is a per-machine discovery singleton. Start
  # the one matching your workflow before launching nodes, e.g.:
  #   docker compose up -d zenoh_router_sim
  # It listens on tcp/0.0.0.0:7447 over the host network. Point client nodes at
  # it with ZENOH_ROUTER_IP_SIM / ZENOH_ROUTER_IP_ROBOT in your .env (these are
  # consumed by scripts/setup_zenoh.sh; default is localhost).
  # NOTE: run only ONE router per host — they share TCP port 7447.
  zenoh_router_sim:
    <<: *common
    build:
      context: .
      dockerfile: ./environment/Dockerfile.dev
      target: a2_base
    restart: unless-stopped
    command: [ "ros2", "run", "rmw_zenoh_cpp", "rmw_zenohd" ]

  zenoh_router_robot:
    <<: *common
    build:
      context: .
      dockerfile: ./environment/Dockerfile.dev
      target: a2_base
    restart: unless-stopped
    command: [ "ros2", "run", "rmw_zenoh_cpp", "rmw_zenohd" ]

  # ---- Foxglove bridge (opt-in) -------------------------------------------
  # Exposes ROS topics to Foxglove Studio over a WebSocket at ws://localhost:8765.
  # Start it explicitly:  docker compose --profile foxglove up -d foxglove
  # Profile-gated so it never auto-starts for Linux/native-RViz users or robot
  # deploys. The command sources scripts/setup.sh so the bridge joins the sim
  # Zenoh graph (matching ROS_DOMAIN_ID / middleware config) and can resolve
  # package:// meshes from the built workspace overlay (dev_colcon_install).
  # Reachable from the host only with Docker Desktop "host networking" enabled.
  foxglove:
    <<: *common
    profiles: [ foxglove ]
    build:
      context: .
      dockerfile: ./environment/Dockerfile.dev
      target: dev
      args:
        UID: ${HOST_UID:-1000}
        GID: ${HOST_GID:-1000}
    depends_on:
      - zenoh_router_sim
    restart: unless-stopped
    command:
      - bash
      - -c
      - "source /a2_ros/scripts/setup.sh && exec ros2 launch foxglove_bridge foxglove_bridge_launch.xml"
    volumes:
      - *vol-workspace
      - type: volume
        source: dev_colcon_install
        target: /a2_ros/install

  # ---- KasmVNC desktop (opt-in) -------------------------------------------
  # Starts a KasmVNC X server + XFCE desktop on display :20, served at
  # https://localhost:8444 (user: ubuntu, password: VNC_PASSWORD).
  # It mounts the workspace + the shared build/install volumes, so its desktop
  # terminal is a full ROS environment (on the same Zenoh graph as a2_ros_dev,
  # sharing the same built workspace). Two ways to use it:
  #   - work IN the browser desktop: open a terminal there, run sim/RViz/MuJoCo
  #     (DISPLAY=:20 is already the default), windows appear in the same desktop.
  #   - work FROM a2_ros_dev and render here, via the X-socket override:
  #       docker compose -f compose.yaml -f compose.vnc.yml --profile vnc up -d
  #       docker compose exec a2_ros_dev bash -lc 'DISPLAY=:20 rviz2'
  # Reachable from the host only with Docker Desktop "host networking" enabled.
  # Profile-gated; built from the `vnc` image stage (KasmVNC + XFCE).
  vnc:
    <<: *common
    profiles: [ vnc ]
    build:
      context: .
      dockerfile: ./environment/Dockerfile.dev
      target: vnc
      args:
        UID: ${HOST_UID:-1000}
        GID: ${HOST_GID:-1000}
    restart: unless-stopped
    # Start the X server, then allow local (same-host) clients so other
    # containers sharing the X socket can connect, and idle on the session log.
    command:
      - bash
      - -c
      - "vncserver -kill :20 >/dev/null 2>&1 || true; rm -f /tmp/.X11-unix/X20 /tmp/.X20-lock; vncserver :20 && DISPLAY=:20 xhost +local: >/dev/null 2>&1; exec tail -F /home/ubuntu/.vnc/*.log"
    volumes:
      # Expose the X server's socket (/tmp/.X11-unix/X20) on a named volume so
      # other containers (a2_ros_dev) can render to this display.
      - type: volume
        source: x11
        target: /tmp/.X11-unix
      # Workspace + shared build/install volumes, so the desktop terminal is a
      # full ROS env sharing the same built workspace as a2_ros_dev.
      - *vol-workspace
      - type: volume
        source: dev_colcon_build
        target: /a2_ros/build
      - type: volume
        source: dev_colcon_install
        target: /a2_ros/install

volumes:
  dev_bash_history:
  dev_colcon_build:
  dev_colcon_install:
  dev_rosdep_cache:
  # Shared by a2_ros_nuc and a2_ros_pc2. Each runs on its own host (separate
  # Docker daemon), so the same volume names stay independent per machine.
  robot_bash_history:
  robot_colcon_build:
  robot_colcon_install:
  robot_rosdep_cache:
  # Shares the KasmVNC X socket (/tmp/.X11-unix) between the vnc server and
  # a2_ros_dev (see compose.vnc.yml) so GUI apps in dev can render to display :20.
  x11:
